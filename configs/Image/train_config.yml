#### general settings
MODEL:
  image_model_name: 'net_image1'
  n_feats: 16

TRAINING:
  gpu_ids: [0]
  batch_size: 4
  num_workers: 16
  num_epochs: 100
  lr: 2e-4
  grad_clip: 0.1
  resume_model: False
  checkpoint_path: './checkpoints'

#### datasets
DATASETS:
  train:
    raw_root: '../../../share/UIE/datasets/train/LL/input'
    gt_root: '../../../share/UIE/datasets/train/LL/gt'
    size: [320, 240]
    use_shuffle: true

  val:
    raw_root: '../../../share/UIE/datasets/val/LL/input'
    gt_root: '../../../share/UIE/datasets/val/LL/gt'
    size: [320, 240]
    use_shuffle: false