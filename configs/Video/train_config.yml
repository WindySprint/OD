#### general settings
MODEL:
  image_model_name: 'net_image'
  video_model_name: 'net_video'
  n_feats: 16

TRAINING:
  gpu_ids: [1]
  batch_size: 4
  num_workers: 16
  num_epochs: 100
  lr: 2e-4
  grad_clip: 0.1
  resume_model: False
  checkpoint_path: './checkpoints'
  num_frames: 5     # how many frames as a input.

#### datasets
DATASETS:
  train:
    raw_root: '../../../share/UIE/datasets/train/U/input'
    gt_root: '../../../share/UIE/datasets/train/U/gt'
    size: [320, 240]
    use_shuffle: true

  val:
    raw_root: '../../../share/UIE/datasets/val/U/input'
    gt_root: '../../../share/UIE/datasets/val/U/gt'
    size: [320, 240]
    use_shuffle: false